 [env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor Configuration
monitor_speed = 115200
monitor_filters = 
    esp32_exception_decoder
    time

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_ARCH_ESP32
    -mfix-esp32-psram-cache-issue
    
; Library dependencies
lib_deps =   
    ; WiFi and Network (Built-in to ESP32 Arduino Core)
    ; WiFi
    ; WiFiClientSecure
    ; HTTPClient
    ; HTTPUpdate
    ; WebServer
    
    ; MQTT Client
    knolleary/PubSubClient@^2.8
    
    ; JSON Processing
    bblanchon/ArduinoJson@^6.21.3
    
    ; File System (Built-in)
    ; SPIFFS
    ; FS
    
    ; I2C/SPI (Built-in)
    ; Wire
    ; SPI

; Note: You need to manually add ADE9153A library to lib/ folder
; since it's a custom library not available in PlatformIO registry

; Upload settings
upload_speed = 921600
; Uncomment and set your COM port
; Windows:
; upload_port = COM3
; Linux:
; upload_port = /dev/ttyUSB0
; macOS:
; upload_port = /dev/cu.usbserial-*

; Build options
build_type = release
; For debugging, change to: build_type = debug

; Partition scheme for OTA support
board_build.partitions = default.csv
; Use this for larger apps with OTA:
; board_build.partitions = min_spiffs.csv

; Flash settings
board_build.flash_mode = dio
board_build.flash_size = 4MB

; Optional: OTA Upload (for future wireless updates)
; Uncomment after first successful upload via USB
; upload_protocol = espota
; upload_port = 192.168.1.xxx  ; Your ESP32 IP address
; upload_flags =
;     --port=3232
;    --auth=your_ota_password